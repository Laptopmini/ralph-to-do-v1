<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main data-testid="todo-app">
      <h1>Todo</h1>
      <form data-testid="todo-form">
        <input type="text" data-testid="todo-input" placeholder="What needs to be done?" autocomplete="off" maxlength="240" />
        <button type="submit" data-testid="todo-submit">Add</button>
      </form>

      <div>
        <button type="button" data-testid="filter-all" aria-pressed="true">All</button>
        <button type="button" data-testid="filter-active" aria-pressed="false">Active</button>
        <button type="button" data-testid="filter-completed" aria-pressed="false">Completed</button>
      </div>

      <ul data-testid="todo-list"></ul>

      <p data-testid="empty-state">No todos yet!</p>

      <footer>
        <span data-testid="todo-count">0</span>
      </footer>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
