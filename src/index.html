<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ralph HTML App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form data-testid="todo-form">
      <input type="text" data-testid="todo-input" placeholder="What needs to be done?" />
      <button type="submit" data-testid="todo-submit">Add</button>
    </form>

    <div data-testid="todo-count">0</div>

    <ul data-testid="todo-list"></ul>

    <div data-testid="empty-state">No todos yet!</div>

    <div>
      <button type="button" data-testid="filter-all" aria-pressed="true">All</button>
      <button type="button" data-testid="filter-active" aria-pressed="false">Active</button>
      <button type="button" data-testid="filter-completed" aria-pressed="false">Completed</button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
