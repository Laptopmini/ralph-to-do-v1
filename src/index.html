<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main data-testid="todo-app">
      <h1>Todo</h1>
      <form data-testid="todo-form">
        <input
          data-testid="todo-input"
          type="text"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="240"
          required
        />
        <button data-testid="todo-submit" type="submit" aria-label="Add todo">Add</button>
      </form>
      <section data-testid="todo-filters">
        <button data-testid="filter-all" type="button" aria-pressed="true">All</button>
        <button data-testid="filter-active" type="button" aria-pressed="false">Active</button>
        <button data-testid="filter-completed" type="button" aria-pressed="false">Completed</button>
      </section>
      <ul data-testid="todo-list"></ul>
      <p data-testid="empty-state">Nothing to do yet — add your first task above.</p>
      <footer data-testid="todo-footer">
        <span data-testid="todo-count">0 items left</span>
      </footer>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
